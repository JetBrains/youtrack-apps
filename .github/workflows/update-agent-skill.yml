name: Update Agent Skill

on:
  repository_dispatch:
    types:
      - update-youtrack-agent-skill

permissions:
  contents: write

jobs:
  update-agent-skill:
    name: Update bundled YouTrack app builder skill
    runs-on: ubuntu-latest

    steps:
      - name: Validate dispatch payload
        env:
          SOURCE_REPO: ${{ github.event.client_payload.source_repo }}
          SOURCE_REF: ${{ github.event.client_payload.source_ref }}
          SOURCE_PATH: ${{ github.event.client_payload.source_path }}
        run: |
          set -euo pipefail

          if [ -z "$SOURCE_REPO" ]; then
            echo "client_payload.source_repo is required" >&2
            exit 1
          fi

          if [ -z "$SOURCE_REF" ]; then
            echo "client_payload.source_ref is required" >&2
            exit 1
          fi

          if [ -z "$SOURCE_PATH" ]; then
            echo "client_payload.source_path is required" >&2
            exit 1
          fi

          case "$SOURCE_PATH" in
            /*|../*|*/../*|*/..)
              echo "client_payload.source_path must be a relative path inside the source repository" >&2
              exit 1
              ;;
          esac

      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.target_branch || 'main' }}
          token: ${{ secrets.SKILL_SYNC_TOKEN || github.token }}

      - name: Checkout source skill repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.source_repo }}
          ref: ${{ github.event.client_payload.source_ref }}
          path: .skill-source
          token: ${{ secrets.SKILL_SYNC_TOKEN || github.token }}

      - name: Replace bundled skill resources
        env:
          SOURCE_REPO: ${{ github.event.client_payload.source_repo }}
          SOURCE_REF: ${{ github.event.client_payload.source_ref }}
          SOURCE_PATH: ${{ github.event.client_payload.source_path }}
          TARGET_BRANCH: ${{ github.event.client_payload.target_branch || 'main' }}
          TARGET_PATH: packages/create-youtrack-app/resources/skill/youtrack-app-builder
        run: |
          set -euo pipefail

          if [ ! -f ".skill-source/$SOURCE_PATH/SKILL.md" ]; then
            echo "Source skill must contain SKILL.md at $SOURCE_PATH" >&2
            exit 1
          fi

          rm -rf "$TARGET_PATH"
          mkdir -p "$(dirname "$TARGET_PATH")"
          cp -a ".skill-source/$SOURCE_PATH/." "$TARGET_PATH/"
          rm -rf .skill-source

          if git diff --quiet -- "$TARGET_PATH"; then
            echo "No bundled skill changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$TARGET_PATH"
          git commit -m "Update YouTrack app builder skill from $SOURCE_REPO@$SOURCE_REF"
          git push origin "HEAD:$TARGET_BRANCH"
